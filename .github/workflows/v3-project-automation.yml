name: V3 Project Automation

on:
  pull_request:
    types: [opened, reopened, converted_to_draft, ready_for_review, closed]
  issues:
    types: [closed, reopened]

jobs:
  update-v3-project-status:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      pull-requests: read
    env:
      PROJECT_ID: "PVT_kwHOA4HnfM4BTALS"
      STATUS_FIELD_ID: "PVTSSF_lAHOA4HnfM4BTALSzhAX1P0"
      STATUS_TODO: "7d6d37ad"
      STATUS_IN_PROGRESS: "29b92ff7"
      STATUS_IN_REVIEW: "18c82acb"
      STATUS_DONE: "e2b21219"

    steps:
      - name: Get linked project item IDs
        id: get-item
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const eventName = context.eventName;
            const number = context.payload.pull_request?.number ?? context.payload.issue?.number;

            const query = `
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  issueOrPullRequest(number: $number) {
                    ... on Issue {
                      projectItems(first: 5) {
                        nodes { id project { id } }
                      }
                    }
                    ... on PullRequest {
                      closingIssuesReferences(first: 10) {
                        nodes {
                          projectItems(first: 5) {
                            nodes { id project { id } }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const result = await github.graphql(query, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              number
            });

            const obj = result.repository.issueOrPullRequest;
            const projectId = process.env.PROJECT_ID;
            let itemIds = [];

            if (obj.projectItems) {
              itemIds = obj.projectItems.nodes
                .filter(n => n.project.id === projectId)
                .map(n => n.id);
            } else if (obj.closingIssuesReferences) {
              for (const issue of obj.closingIssuesReferences.nodes) {
                const ids = issue.projectItems.nodes
                  .filter(n => n.project.id === projectId)
                  .map(n => n.id);
                itemIds.push(...ids);
              }
            }

            core.setOutput('item-ids', JSON.stringify(itemIds));

      - name: Set status — In Progress (draft PR opened or converted to draft)
        if: |
          (github.event_name == 'pull_request' && github.event.action == 'opened' && github.event.pull_request.draft == true) ||
          (github.event_name == 'pull_request' && github.event.action == 'converted_to_draft')
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const itemIds = JSON.parse('${{ steps.get-item.outputs.item-ids }}');
            const projectId = process.env.PROJECT_ID;
            const fieldId = process.env.STATUS_FIELD_ID;
            const optionId = process.env.STATUS_IN_PROGRESS;
            for (const itemId of itemIds) {
              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId itemId: $itemId fieldId: $fieldId
                    value: { singleSelectOptionId: $optionId }
                  }) { projectV2Item { id } }
                }
              `, { projectId, itemId, fieldId, optionId });
            }

      - name: Set status — In Review (PR ready / non-draft PR opened)
        if: |
          (github.event_name == 'pull_request' && github.event.action == 'opened' && github.event.pull_request.draft == false) ||
          (github.event_name == 'pull_request' && github.event.action == 'ready_for_review') ||
          (github.event_name == 'pull_request' && github.event.action == 'reopened' && github.event.pull_request.draft == false)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const itemIds = JSON.parse('${{ steps.get-item.outputs.item-ids }}');
            const projectId = process.env.PROJECT_ID;
            const fieldId = process.env.STATUS_FIELD_ID;
            const optionId = process.env.STATUS_IN_REVIEW;
            for (const itemId of itemIds) {
              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId itemId: $itemId fieldId: $fieldId
                    value: { singleSelectOptionId: $optionId }
                  }) { projectV2Item { id } }
                }
              `, { projectId, itemId, fieldId, optionId });
            }

      - name: Set status — Done (PR merged)
        if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const itemIds = JSON.parse('${{ steps.get-item.outputs.item-ids }}');
            const projectId = process.env.PROJECT_ID;
            const fieldId = process.env.STATUS_FIELD_ID;
            const optionId = process.env.STATUS_DONE;
            for (const itemId of itemIds) {
              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId itemId: $itemId fieldId: $fieldId
                    value: { singleSelectOptionId: $optionId }
                  }) { projectV2Item { id } }
                }
              `, { projectId, itemId, fieldId, optionId });
            }

      - name: Set status — Done (issue closed)
        if: github.event_name == 'issues' && github.event.action == 'closed'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const itemIds = JSON.parse('${{ steps.get-item.outputs.item-ids }}');
            const projectId = process.env.PROJECT_ID;
            const fieldId = process.env.STATUS_FIELD_ID;
            const optionId = process.env.STATUS_DONE;
            for (const itemId of itemIds) {
              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId itemId: $itemId fieldId: $fieldId
                    value: { singleSelectOptionId: $optionId }
                  }) { projectV2Item { id } }
                }
              `, { projectId, itemId, fieldId, optionId });
            }

      - name: Set status — Todo (issue reopened)
        if: github.event_name == 'issues' && github.event.action == 'reopened'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const itemIds = JSON.parse('${{ steps.get-item.outputs.item-ids }}');
            const projectId = process.env.PROJECT_ID;
            const fieldId = process.env.STATUS_FIELD_ID;
            const optionId = process.env.STATUS_TODO;
            for (const itemId of itemIds) {
              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId itemId: $itemId fieldId: $fieldId
                    value: { singleSelectOptionId: $optionId }
                  }) { projectV2Item { id } }
                }
              `, { projectId, itemId, fieldId, optionId });
            }
